name: Build Windows

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload build artifacts to an existing GitHub Release for the selected ref/tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            self_contained: false
            suffix: framework-dependent
          - rid: win-x64
            self_contained: true
            suffix: self-contained
          - rid: win-arm64
            self_contained: false
            suffix: framework-dependent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Fetch web assets
        shell: pwsh
        run: ./scripts/fetch-assets.ps1

      - name: Restore
        run: dotnet restore MdViewer.sln

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish src/MdViewer/MdViewer.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained ${{ matrix.self_contained }} `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/${{ matrix.rid }}-${{ matrix.suffix }}

      - name: Copy README and LICENSE
        shell: pwsh
        run: |
          Copy-Item README.md publish/${{ matrix.rid }}-${{ matrix.suffix }}/README.md
          Copy-Item LICENSE publish/${{ matrix.rid }}-${{ matrix.suffix }}/LICENSE
          Copy-Item examples/sample.md publish/${{ matrix.rid }}-${{ matrix.suffix }}/sample.md

      - name: Zip package
        shell: pwsh
        run: |
          $name = "MdViewer-${{ matrix.rid }}-${{ matrix.suffix }}"
          Compress-Archive -Path publish/${{ matrix.rid }}-${{ matrix.suffix }}/* -DestinationPath "$name.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MdViewer-${{ matrix.rid }}-${{ matrix.suffix }}
          path: MdViewer-${{ matrix.rid }}-${{ matrix.suffix }}.zip

      - name: Upload release asset
        if: inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          files: MdViewer-${{ matrix.rid }}-${{ matrix.suffix }}.zip
