name: Build Go Windows MVP

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload build artifact to an existing GitHub Release for the selected ref/tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: src/MdViewer.Go/go.mod

      - name: Fetch web assets
        shell: pwsh
        run: ./scripts/fetch-assets.ps1

      - name: Download Go dependencies
        shell: pwsh
        working-directory: src/MdViewer.Go
        run: go mod tidy

      - name: Build Go shell
        shell: pwsh
        working-directory: src/MdViewer.Go
        run: |
          New-Item -ItemType Directory -Force -Path ../../publish/go-win-x64 | Out-Null
          go build -ldflags="-H windowsgui -s -w" -o ../../publish/go-win-x64/MdViewerGo.exe .

      - name: Copy runtime assets
        shell: pwsh
        run: |
          Copy-Item -Recurse src/MdViewer/assets publish/go-win-x64/assets
          Copy-Item README.md publish/go-win-x64/README.md
          Copy-Item LICENSE publish/go-win-x64/LICENSE
          Copy-Item examples/sample.md publish/go-win-x64/sample.md
          Copy-Item src/MdViewer.Go/README.md publish/go-win-x64/README-Go-MVP.md

      - name: Zip package
        shell: pwsh
        run: |
          Compress-Archive -Path publish/go-win-x64/* -DestinationPath MdViewer-go-win-x64-mvp.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MdViewer-go-win-x64-mvp
          path: MdViewer-go-win-x64-mvp.zip

      - name: Upload release asset
        if: inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          files: MdViewer-go-win-x64-mvp.zip
