<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MdViewer</title>
  <link rel="stylesheet" href="viewer.css">
  <link rel="stylesheet" href="vendor/highlight/github.min.css" id="hl-light">
  <link rel="stylesheet" href="vendor/highlight/github-dark.min.css" id="hl-dark" disabled>
</head>
<body>
  <div class="shell">
    <aside id="toc-panel" class="toc-panel" aria-label="Document outline">
      <div class="toc-title">目录</div>
      <nav id="toc" class="toc-list"></nav>
    </aside>
    <main id="app" class="markdown-body"></main>
  </div>
  <button id="edit-source" class="edit-source" type="button" title="编辑源 Markdown (Ctrl+E)" aria-label="编辑源 Markdown">
    <span aria-hidden="true">✎</span>
  </button>

  <script src="vendor/markdown-it/markdown-it.min.js"></script>
  <script src="vendor/markdown-it-anchor/markdown-it-anchor.min.js"></script>
  <script src="vendor/highlight/highlight.min.js"></script>
  <script>
    const app = document.getElementById('app');
    const toc = document.getElementById('toc');
    const editSourceButton = document.getElementById('edit-source');
    const lightHighlight = document.getElementById('hl-light');
    const darkHighlight = document.getElementById('hl-dark');
    let currentBasePath = null;
    let headingObserver = null;
    let dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    let mermaidLoadPromise = null;
    let katexLoadPromise = null;

    const md = window.markdownit({
      html: false,
      linkify: true,
      typographer: true,
      highlight(code, lang) {
        if (lang && window.hljs && hljs.getLanguage(lang)) {
          try {
            return `<pre><code class="hljs language-${escapeHtml(lang)}">${hljs.highlight(code, { language: lang, ignoreIllegals: true }).value}</code></pre>`;
          } catch {}
        }
        return `<pre><code class="hljs">${escapeHtml(code)}</code></pre>`;
      }
    }).use(window.markdownItAnchor || function () {});

    const defaultFence = md.renderer.rules.fence || function(tokens, idx, options, env, self) {
      return self.renderToken(tokens, idx, options);
    };

    md.renderer.rules.fence = function(tokens, idx, options, env, self) {
      const token = tokens[idx];
      const info = token.info ? token.info.trim() : '';
      if (info === 'mermaid') {
        return `<div class="mermaid">${escapeHtml(token.content)}</div>`;
      }
      return defaultFence(tokens, idx, options, env, self);
    };

    const defaultImage = md.renderer.rules.image || function(tokens, idx, options, env, self) {
      return self.renderToken(tokens, idx, options);
    };

    md.renderer.rules.image = function(tokens, idx, options, env, self) {
      const token = tokens[idx];
      const srcIndex = token.attrIndex('src');
      if (srcIndex >= 0) {
        token.attrs[srcIndex][1] = resolveLocalUrl(token.attrs[srcIndex][1]);
      }
      return defaultImage(tokens, idx, options, env, self);
    };

    function applyTheme() {
      document.documentElement.classList.toggle('dark', dark);
      lightHighlight.disabled = dark;
      darkHighlight.disabled = !dark;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function resolveLocalUrl(url) {
      if (!url || /^(https?:|data:|file:|mailto:|#)/i.test(url) || !currentBasePath) {
        return url;
      }
      return 'https://mdviewer-files.local/' + encodeURI(url).replaceAll('%5C', '/');
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          resolve();
          return;
        }

        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });
    }

    function loadStyle(href) {
      if (document.querySelector(`link[href="${href}"]`)) {
        return;
      }

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href;
      document.head.appendChild(link);
    }

    function hasMermaid(source) {
      return /(^|\n)```\s*mermaid\b/i.test(source);
    }

    function hasMath(source) {
      return /(^|[^\\])\$\$[\s\S]+?\$\$|(^|[^\\])\$[^\n$]+?\$|\\\(|\\\[/m.test(source);
    }

    async function ensureMermaid() {
      if (window.mermaid) {
        return;
      }

      mermaidLoadPromise ||= loadScript('vendor/mermaid/mermaid.min.js').then(() => {
        window.mermaid.initialize({
          startOnLoad: false,
          securityLevel: 'strict',
          theme: dark ? 'dark' : 'default'
        });
      });
      await mermaidLoadPromise;
    }

    async function ensureKatex() {
      if (window.renderMathInElement) {
        return;
      }

      loadStyle('vendor/katex/katex.min.css');
      katexLoadPromise ||= loadScript('vendor/katex/katex.min.js')
        .then(() => loadScript('vendor/katex/auto-render.min.js'));
      await katexLoadPromise;
    }

    async function render(payload) {
      currentBasePath = payload.basePath || payload.BasePath || null;
      const source = payload.markdown || payload.Markdown || '';
      try {
        app.innerHTML = md.render(source);
        buildToc();

        if (hasMath(source)) {
          await ensureKatex();
          window.renderMathInElement?.(app, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\(', right: '\\)', display: false },
              { left: '\\[', right: '\\]', display: true }
            ],
            throwOnError: false
          });
        }

        if (hasMermaid(source)) {
          await renderMermaidDiagrams();
        }
      } catch (error) {
        app.innerHTML = `<div class="error-box"><strong>Render failed</strong><pre>${escapeHtml(error && error.message ? error.message : error)}</pre></div>`;
        buildToc();
      }
    }

    async function renderMermaidDiagrams() {
      await ensureMermaid();
      const diagrams = Array.from(app.querySelectorAll('.mermaid'));
      for (const [index, diagram] of diagrams.entries()) {
        const source = diagram.textContent || '';
        if (!source.trim()) {
          continue;
        }

        try {
          const result = await renderMermaidSource(source, index);
          diagram.innerHTML = result.svg;
          result.bindFunctions?.(diagram);
        } catch (error) {
          diagram.classList.add('mermaid-error');
          diagram.innerHTML = `<strong>Mermaid 渲染失败</strong><pre>${escapeHtml(error && error.message ? error.message : error)}</pre>`;
        }
      }
    }

    async function renderMermaidSource(source, index) {
      const id = `mermaid-${Date.now()}-${index}`;
      try {
        return await window.mermaid.render(id, source);
      } catch (error) {
        const normalized = normalizeMermaidSource(source);
        if (normalized === source) {
          throw error;
        }
        return await window.mermaid.render(`${id}-compat`, normalized);
      }
    }

    function normalizeMermaidSource(source) {
      if (!/^\s*(graph|flowchart)\b/im.test(source)) {
        return source;
      }

      return source.replace(/(^|[^\w])([A-Za-z_][\w-]*)\[([^\]\n"]*?[():][^\]\n"]*?)\]/g, (_, prefix, id, label) => {
        return `${prefix}${id}["${label.replaceAll('"', '\\"')}"]`;
      });
    }

    function buildToc() {
      if (headingObserver) {
        headingObserver.disconnect();
        headingObserver = null;
      }

      const headings = Array.from(app.querySelectorAll('h1, h2, h3, h4'));
      toc.innerHTML = '';

      if (headings.length === 0) {
        toc.innerHTML = '<div class="toc-empty">没有标题节点</div>';
        return;
      }

      headings.forEach((heading, index) => {
        if (!heading.id) {
          heading.id = 'heading-' + index;
        }

        const link = document.createElement('a');
        link.href = '#' + heading.id;
        link.className = 'toc-item level-' + heading.tagName.substring(1);
        link.textContent = heading.textContent || 'Untitled';
        link.dataset.target = heading.id;
        link.addEventListener('click', event => {
          event.preventDefault();
          heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + heading.id);
        });
        toc.appendChild(link);
      });

      headingObserver = new IntersectionObserver(entries => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
        if (!visible) return;
        const id = visible.target.id;
        toc.querySelectorAll('.toc-item').forEach(item => {
          item.classList.toggle('active', item.dataset.target === id);
        });
      }, { rootMargin: '-12% 0px -70% 0px', threshold: [0, 1] });

      headings.forEach(heading => headingObserver.observe(heading));
    }

    function editSource() {
      window.chrome?.webview?.postMessage('edit-source');
    }

    editSourceButton.addEventListener('click', editSource);
    document.addEventListener('keydown', event => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'e') {
        event.preventDefault();
        editSource();
      }
    });

    window.mdviewer = {
      render,
      toggleTheme() {
        dark = !dark;
        applyTheme();
        window.mermaid?.initialize({ startOnLoad: false, securityLevel: 'strict', theme: dark ? 'dark' : 'default' });
      }
    };

    applyTheme();
    window.chrome?.webview?.postMessage('viewer-ready');
  </script>
</body>
</html>
