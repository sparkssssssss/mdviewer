<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MdViewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div class="shell">
    <aside id="toc-panel" class="toc-panel" aria-label="Document outline">
      <div class="toc-title">目录</div>
      <nav id="toc" class="toc-list"></nav>
    </aside>
    <main id="app" class="markdown-body"></main>
  </div>
  <button id="edit-source" class="edit-source" type="button" title="编辑源 Markdown (Ctrl+E)" aria-label="编辑源 Markdown">
    <span aria-hidden="true">✎</span>
  </button>

  <script src="vendor/markdown-it/markdown-it.min.js"></script>
  <script src="vendor/markdown-it-anchor/markdown-it-anchor.min.js"></script>
  <script>
    const app = document.getElementById('app');
    const toc = document.getElementById('toc');
    const editSourceButton = document.getElementById('edit-source');
    let currentBasePath = null;
    let headingObserver = null;
    let dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    let mermaidLoadPromise = null;
    let katexLoadPromise = null;
    let highlightLoadPromise = null;
    let renderVersion = 0;

    const md = window.markdownit({
      html: false,
      linkify: true,
      typographer: true,
      highlight(code, lang) {
        const language = lang ? ` language-${escapeHtml(lang)}` : '';
        return `<pre><code class="hljs${language}">${escapeHtml(code)}</code></pre>`;
      }
    }).use(window.markdownItAnchor || function () {});

    const defaultFence = md.renderer.rules.fence || function(tokens, idx, options, env, self) {
      return self.renderToken(tokens, idx, options);
    };

    md.renderer.rules.fence = function(tokens, idx, options, env, self) {
      const token = tokens[idx];
      const info = token.info ? token.info.trim() : '';
      if (info === 'mermaid') {
        return `<div class="mermaid">${escapeHtml(token.content)}</div>`;
      }
      return defaultFence(tokens, idx, options, env, self);
    };

    const defaultImage = md.renderer.rules.image || function(tokens, idx, options, env, self) {
      return self.renderToken(tokens, idx, options);
    };

    md.renderer.rules.image = function(tokens, idx, options, env, self) {
      const token = tokens[idx];
      const srcIndex = token.attrIndex('src');
      if (srcIndex >= 0) {
        token.attrs[srcIndex][1] = resolveLocalUrl(token.attrs[srcIndex][1]);
      }
      return defaultImage(tokens, idx, options, env, self);
    };

    function applyTheme() {
      document.documentElement.classList.toggle('dark', dark);
      document.querySelectorAll('link[data-highlight-theme]').forEach(link => {
        link.disabled = link.dataset.theme === 'dark' ? !dark : dark;
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function resolveLocalUrl(url) {
      if (!url || /^(https?:|data:|file:|mailto:|#)/i.test(url)) {
        return url;
      }

      const fileBaseUrl = window.mdviewerFileBaseUrl || null;
      if (fileBaseUrl) {
        return fileBaseUrl + encodeURI(url).replaceAll('%5C', '/');
      }

      if (!currentBasePath) {
        return url;
      }
      return 'https://mdviewer-files.local/' + encodeURI(url).replaceAll('%5C', '/');
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          resolve();
          return;
        }

        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });
    }

    function loadStyle(href, options = {}) {
      if (document.querySelector(`link[href="${href}"]`)) {
        return;
      }

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href;
      if (options.highlightTheme) {
        link.dataset.highlightTheme = 'true';
        link.dataset.theme = options.theme;
      }
      if (typeof options.disabled === 'boolean') {
        link.disabled = options.disabled;
      }
      document.head.appendChild(link);
    }

    function hasMermaid(source) {
      return /(^|\n)```\s*mermaid\b/i.test(source);
    }

    function hasMath(source) {
      return /(^|[^\\])\$\$[\s\S]+?\$\$|(^|[^\\])\$[^\n$]+?\$|\\\(|\\\[/m.test(source);
    }

    function hasCodeFence(source) {
      return /(^|\n)```/.test(source);
    }

    async function ensureHighlight() {
      if (window.hljs) {
        return;
      }

      loadHighlightThemes();
      highlightLoadPromise ||= loadScript('vendor/highlight/highlight.min.js');
      await highlightLoadPromise;
    }

    function loadHighlightThemes() {
      loadStyle('vendor/highlight/github.min.css', { highlightTheme: true, theme: 'light', disabled: dark });
      loadStyle('vendor/highlight/github-dark.min.css', { highlightTheme: true, theme: 'dark', disabled: !dark });
    }

    async function ensureMermaid() {
      if (!window.mermaid) {
        mermaidLoadPromise ||= loadScript('vendor/mermaid/mermaid.min.js');
        await mermaidLoadPromise;
      }

      const api = getMermaidApi();
      if (!api) {
        throw new Error('Mermaid loaded but no compatible API was found');
      }

      api.initialize?.({
        startOnLoad: false,
        securityLevel: 'strict',
        theme: dark ? 'dark' : 'default'
      });
    }

    async function ensureKatex() {
      if (window.renderMathInElement) {
        return;
      }

      loadStyle('vendor/katex/katex.min.css');
      katexLoadPromise ||= loadScript('vendor/katex/katex.min.js')
        .then(() => loadScript('vendor/katex/auto-render.min.js'));
      await katexLoadPromise;
    }

    function scheduleEnhancement(version, task) {
      requestAnimationFrame(() => {
        window.setTimeout(async () => {
          if (version !== renderVersion) {
            return;
          }

          try {
            await task();
          } catch {
            // Progressive enhancements must not block the readable Markdown view.
          }
        }, 0);
      });
    }

    async function render(payload) {
      const version = ++renderVersion;
      currentBasePath = payload.basePath || payload.BasePath || null;
      window.mdviewerFileBaseUrl = payload.fileBaseUrl || payload.FileBaseUrl || null;
      const source = payload.markdown || payload.Markdown || '';
      try {
        app.innerHTML = md.render(source);
        enhanceCodeBlocks();
        buildToc();

        if (hasCodeFence(source)) {
          scheduleEnhancement(version, highlightCodeBlocks);
        }

        if (hasMath(source)) {
          scheduleEnhancement(version, async () => {
            await ensureKatex();
            if (version !== renderVersion) {
              return;
            }
            window.renderMathInElement?.(app, {
              delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false },
                { left: '\\(', right: '\\)', display: false },
                { left: '\\[', right: '\\]', display: true }
              ],
              throwOnError: false
            });
          });
        }

        if (hasMermaid(source)) {
          scheduleEnhancement(version, renderMermaidDiagrams);
        }
      } catch (error) {
        app.innerHTML = `<div class="error-box"><strong>Render failed</strong><pre>${escapeHtml(error && error.message ? error.message : error)}</pre></div>`;
        buildToc();
      }
    }

    function enhanceCodeBlocks() {
      app.querySelectorAll('pre').forEach(pre => {
        const code = pre.querySelector('code');
        if (!code || pre.querySelector('.copy-code')) {
          return;
        }

        pre.classList.add('code-block');
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'copy-code';
        button.textContent = '复制';
        button.setAttribute('aria-label', '复制代码');
        button.addEventListener('click', async () => {
          const ok = await copyText(code.textContent || '');
          button.textContent = ok ? '已复制' : '复制失败';
          button.classList.toggle('copied', ok);
          window.setTimeout(() => {
            button.textContent = '复制';
            button.classList.remove('copied');
          }, 1400);
        });
        pre.appendChild(button);
      });
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch {
        // Fall back to the hidden textarea path below.
      }

      try {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand('copy');
        textarea.remove();
        return ok;
      } catch {
        return false;
      }
    }

    async function highlightCodeBlocks() {
      try {
        await ensureHighlight();
        app.querySelectorAll('pre code').forEach(block => window.hljs.highlightElement(block));
      } catch {
        // Code highlighting is progressive enhancement; plain code blocks remain readable.
      }
    }

    async function renderMermaidDiagrams() {
      try {
        await ensureMermaid();
        const diagrams = Array.from(app.querySelectorAll('.mermaid'));
        for (const [index, diagram] of diagrams.entries()) {
          const source = diagram.textContent || '';
          if (!source.trim()) {
            continue;
          }

          try {
            await renderMermaidElement(diagram, source, index);
          } catch (error) {
            diagram.classList.add('mermaid-error');
            diagram.innerHTML = `<strong>Mermaid 渲染失败</strong><pre>${escapeHtml(error && error.message ? error.message : error)}</pre>`;
          }
        }
      } catch (error) {
        app.querySelectorAll('.mermaid').forEach(diagram => {
          diagram.classList.add('mermaid-error');
          const source = diagram.textContent || '';
          diagram.innerHTML = `<strong>Mermaid 暂不可用</strong><pre>${escapeHtml(source || (error && error.message ? error.message : error))}</pre>`;
        });
      }
    }

    function getMermaidApi() {
      const mermaid = window.mermaid;
      return mermaid?.render || mermaid?.run || mermaid?.initialize
        ? mermaid
        : mermaid?.default || null;
    }

    async function renderMermaidElement(element, source, index) {
      const api = getMermaidApi();
      const id = `mermaid-${Date.now()}-${index}`;
      try {
        await renderMermaidWithApi(api, element, id, source);
      } catch (error) {
        const normalized = normalizeMermaidSource(source);
        if (normalized === source) {
          throw error;
        }
        await renderMermaidWithApi(api, element, `${id}-compat`, normalized);
      }
    }

    async function renderMermaidWithApi(api, element, id, source) {
      if (typeof api?.render === 'function') {
        const result = await api.render(id, source);
        element.innerHTML = result.svg || result;
        result.bindFunctions?.(element);
        return;
      }

      if (typeof api?.mermaidAPI?.render === 'function') {
        const result = await api.mermaidAPI.render(id, source);
        element.innerHTML = result.svg || result;
        result.bindFunctions?.(element);
        return;
      }

      if (typeof api?.run === 'function') {
        element.removeAttribute('data-processed');
        element.textContent = source;
        await api.run({ nodes: [element] });
        return;
      }

      throw new Error('Mermaid render API is unavailable');
    }

    function normalizeMermaidSource(source) {
      if (!/^\s*(graph|flowchart)\b/im.test(source)) {
        return source;
      }

      // Mermaid 10/11 is stricter than older releases for flowchart labels.
      // Labels such as `B[Render with markdown-it]` or `E[highlight.js code]`
      // can be parsed as expressions/operators in some versions. Quote plain
      // bracket labels before the compatibility retry so common Markdown samples
      // render instead of showing a Mermaid parse error.
      return source.replace(/(^|[^\w])([A-Za-z_][\w-]*)\[([^\]\n"]+)\]/g, (_, prefix, id, label) => {
        return `${prefix}${id}["${label.replaceAll('"', '\\"')}"]`;
      });
    }

    function buildToc() {
      if (headingObserver) {
        headingObserver.disconnect();
        headingObserver = null;
      }

      const headings = Array.from(app.querySelectorAll('h1, h2, h3, h4'));
      toc.innerHTML = '';

      if (headings.length === 0) {
        toc.innerHTML = '<div class="toc-empty">没有标题节点</div>';
        return;
      }

      headings.forEach((heading, index) => {
        if (!heading.id) {
          heading.id = 'heading-' + index;
        }

        const link = document.createElement('a');
        link.href = '#' + heading.id;
        link.className = 'toc-item level-' + heading.tagName.substring(1);
        link.textContent = heading.textContent || 'Untitled';
        link.dataset.target = heading.id;
        link.addEventListener('click', event => {
          event.preventDefault();
          heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + heading.id);
        });
        toc.appendChild(link);
      });

      headingObserver = new IntersectionObserver(entries => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
        if (!visible) return;
        const id = visible.target.id;
        toc.querySelectorAll('.toc-item').forEach(item => {
          item.classList.toggle('active', item.dataset.target === id);
        });
      }, { rootMargin: '-12% 0px -70% 0px', threshold: [0, 1] });

      headings.forEach(heading => headingObserver.observe(heading));
    }

    function openFile() {
      if (window.chrome?.webview) {
        window.chrome.webview.postMessage('open-file');
      } else if (window.openMarkdownFile) {
        window.openMarkdownFile();
      }
    }

    function editSource() {
      if (window.chrome?.webview) {
        window.chrome.webview.postMessage('edit-source');
      } else if (window.editSource) {
        window.editSource();
      }
    }

    editSourceButton.addEventListener('click', editSource);
    document.addEventListener('keydown', event => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'e') {
        event.preventDefault();
        editSource();
      }
    });

    window.mdviewer = {
      render,
      toggleTheme() {
        dark = !dark;
        applyTheme();
        window.mermaid?.initialize({ startOnLoad: false, securityLevel: 'strict', theme: dark ? 'dark' : 'default' });
      }
    };

    applyTheme();
    if (window.chrome?.webview) {
      window.chrome.webview.postMessage('viewer-ready');
    } else if (window.viewerReady) {
      window.viewerReady();
    }
  </script>
</body>
</html>
